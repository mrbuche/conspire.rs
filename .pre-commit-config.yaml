repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
    -   id: check-yaml
    -   id: check-added-large-files
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
-   repo: https://github.com/backplane/pre-commit-rust-hooks
    rev: v1.1.0
    hooks:
    -   id: clippy
        args: ['--features', 'math', '--', '-D',  'warnings']
        name: cargo clippy math
    -   id: clippy
        args: ['--features', 'math', '--tests', '--', '-D',  'warnings']
        name: cargo clippy math tests
    -   id: clippy
        args: ['--features', 'io', '--', '-D',  'warnings']
        name: cargo clippy io
    -   id: clippy
        args: ['--features', 'io netcdf', '--', '-D',  'warnings']
        name: cargo clippy io netcdf
    -   id: clippy
        args: ['--features', 'geometry', '--', '-D',  'warnings']
        name: cargo clippy geometry
    -   id: clippy
        args: ['--features', 'geometry netcdf', '--', '-D',  'warnings']
        name: cargo clippy geometry netcdf
    -   id: clippy
        args: ['--features', 'mechanics', '--', '-D',  'warnings']
        name: cargo clippy mechanics
    -   id: clippy
        args: ['--features', 'physics', '--', '-D',  'warnings']
        name: cargo clippy physics
    -   id: clippy
        args: ['--features', 'constitutive', '--', '-D',  'warnings']
        name: cargo clippy constitutive
    -   id: clippy
        args: ['--features', 'fem', '--', '-D',  'warnings']
        name: cargo clippy fem
    -   id: clippy
        args: ['--features', 'fem netcdf', '--', '-D',  'warnings']
        name: cargo clippy fem netcdf
    -   id: clippy
        args: ['--features', 'vem', '--', '-D',  'warnings']
        name: cargo clippy vem
    -   id: clippy
        args: ['--features', 'vem netcdf', '--', '-D',  'warnings']
        name: cargo clippy vem netcdf
    -   id: clippy
        args: ['--features', 'all', '--', '-D',  'warnings']
        name: cargo clippy all
    -   id: clippy
        args: ['--features', 'all', '--tests', '--', '-D',  'warnings']
        name: cargo clippy all tests
    -   id: clippy
        args: ['--features', 'all doc', '--', '-D',  'warnings']
        name: cargo clippy doc
    -   id: fmt
